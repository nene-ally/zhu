name: Desktop Auto Pre-Release

on:
  workflow_dispatch:

concurrency:
  group: desktop-auto-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Resolve app version from package.json
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.getContent({
              owner,
              repo,
              path: "package.json",
              ref: context.ref,
            });
            let packageJson;
            try {
              packageJson = JSON.parse(Buffer.from(data.content, "base64").toString("utf8"));
            } catch (error) {
              throw new Error(`Invalid package.json content: ${error.message}`);
            }
            if (!packageJson.version) {
              throw new Error("Missing version field in package.json");
            }
            core.setOutput("app_version", String(packageJson.version));

      - name: Compute branch-aware release metadata
        id: metadata
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SOURCE_SHA: ${{ github.sha }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          : "${BRANCH_NAME:?Missing github.ref_name}"
          : "${DEFAULT_BRANCH:?Missing github.event.repository.default_branch}"
          : "${SOURCE_SHA:?Missing github.sha}"
          : "${APP_VERSION:?Missing package.json version}"

          branch_slug=${BRANCH_NAME//\//-}
          if [[ "$BRANCH_NAME" == "$DEFAULT_BRANCH" ]]; then
            tag_name="desktop-auto-v$APP_VERSION"
            release_suffix=''
          else
            tag_name="desktop-auto-v$APP_VERSION-$branch_slug"
            release_suffix=" [$BRANCH_NAME]"
          fi

          {
            echo "tag_name=$tag_name"
            echo "release_name<<EOF"
            echo "TauriTavern 桌面端自动构建（安装版 + 便携版）v$APP_VERSION$release_suffix / TauriTavern Desktop Auto Build (Installer + Portable) v$APP_VERSION$release_suffix"
            echo "EOF"
            echo "release_body<<EOF"
            echo "## 桌面端自动构建（预发布）"
            echo "这是由 GitHub Actions 自动构建的桌面客户端预发布版本，仅用于测试和体验，不代表稳定正式版。"
            echo "本 release 包含适合各平台的桌面分发产物：Windows / macOS / Linux 安装包，以及适合的便携版产物。"
            echo "来源分支：$BRANCH_NAME"
            echo "来源提交：$SOURCE_SHA"
            echo
            echo "## Desktop Auto Build (Pre-release)"
            echo "This is an automatically built desktop client pre-release generated by GitHub Actions."
            echo "It is intended for testing and preview only, and is not a stable production release."
            echo "This release includes platform-appropriate desktop artifacts: installers for Windows / macOS / Linux, plus portable artifacts where that distribution model makes sense."
            echo "Source branch: $BRANCH_NAME"
            echo "Source commit: $SOURCE_SHA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update desktop pre-release
        id: release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
          RELEASE_BODY: ${{ steps.metadata.outputs.release_body }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            const name = process.env.RELEASE_NAME;
            const body = process.env.RELEASE_BODY;
            if (!tag || !name || !body) {
              throw new Error("Missing desktop pre-release metadata outputs.");
            }

            const { owner, repo } = context.repo;

            try {
              const { data: existingRelease } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              if (existingRelease.draft) {
                throw new Error(`Release ${tag} already exists as a draft.`);
              }

              const { data: updatedRelease } = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existingRelease.id,
                tag_name: tag,
                name,
                body,
                draft: false,
                prerelease: true,
              });

              core.setOutput("release_id", String(updatedRelease.id));
              core.info(`Updated existing desktop pre-release ${tag} (${updatedRelease.id}).`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const { data: createdRelease } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name,
                body,
                draft: false,
                prerelease: true,
              });

              core.setOutput("release_id", String(createdRelease.id));
              core.info(`Created desktop pre-release ${tag} (${createdRelease.id}).`);
            }

  build-and-publish:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            platform: windows-latest
            args: ""
          - name: macos-x64
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - name: macos-arm64
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - name: linux-x64
            platform: ubuntu-22.04
            args: --bundles appimage,deb,rpm
          - name: linux-arm64
            platform: ubuntu-22.04-arm
            args: --bundles deb,rpm

    runs-on: ${{ matrix.platform }}
    name: build-${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf rpm \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-alsa gstreamer1.0-pulseaudio
          if apt-cache show libayatana-appindicator3-dev > /dev/null 2>&1; then
            sudo apt-get install -y libayatana-appindicator3-dev
          else
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install Rust toolchain (default target)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain (macOS cross targets)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run web:build

      - name: Setup macOS signing and notarization
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: ./scripts/ci/setup-macos-signing.sh

      - name: Build and upload desktop pre-release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          prerelease: true
          args: ${{ matrix.args }}

  build-and-publish-portable:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            platform: windows-latest
            args: ""
          - name: linux-x64
            platform: ubuntu-22.04
            args: ""
          - name: linux-arm64
            platform: ubuntu-22.04-arm
            args: ""

    runs-on: ${{ matrix.platform }}
    name: build-portable-${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf rpm \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-alsa gstreamer1.0-pulseaudio
          if apt-cache show libayatana-appindicator3-dev > /dev/null 2>&1; then
            sudo apt-get install -y libayatana-appindicator3-dev
          else
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install Rust toolchain (default target)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain (macOS cross targets)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run web:build

      - name: Build and upload desktop portable pre-release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          prerelease: true
          includeUpdaterJson: false
          args: ${{ matrix.args }} --no-bundle --features portable
          uploadPlainBinary: true
          assetNamePattern: '[name]-[version]-[platform]-[arch]-portable[ext]'
