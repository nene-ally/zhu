name: iOS unsigned artifact

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ios-unsigned.yml'
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend bundles
        run: pnpm run web:build
      - name: Frontend checks
        run: pnpm run check
      - name: Initialize iOS project
        run: pnpm exec tauri ios init
      - name: Build unsigned iOS app
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          DEVELOPMENT_TEAM: 
        run: |
          pnpm exec tauri ios build --release --ci
      - name: Package unsigned app artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          app_path="$(find src-tauri/gen/apple -type d -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo 'No .app produced by Tauri iOS build' >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" artifacts/tauritavern-ios-unsigned.app.zip
          find src-tauri/gen/apple -type f -name '*.ipa' -exec cp {} artifacts/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: tauritavern-ios-unsigned
          path: artifacts/
          if-no-files-found: error
