name: iOS unsigned artifact

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ios-unsigned.yml'
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select stable Xcode
        run: |
          if [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.2.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.0.app/Contents/Developer
          else
            echo "No Xcode 16.2 installation found" >&2
            ls -d /Applications/Xcode*.app >&2 || true
            exit 1
          fi
          xcodebuild -version
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend bundles
        run: pnpm run web:build
      - name: Frontend checks
        run: pnpm run check
      - name: Initialize iOS project
        run: pnpm exec tauri ios init
      - name: Disable Xcode signing
        run: |
          python3 - <<PY
          from pathlib import Path
          p = Path("src-tauri/gen/apple/tauritavern.xcodeproj/project.pbxproj")
          s = p.read_text()
          additions = "\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGN_IDENTITY = \"\";\n\t\t\t\tDEVELOPMENT_TEAM = \"\";"
          if "CODE_SIGNING_ALLOWED = NO;" not in s:
              s = s.replace("\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER =", additions + "\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER =")
          p.write_text(s)
          PY
      - name: Build unsigned iOS app
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          DEVELOPMENT_TEAM: 
        run: |
          pnpm exec tauri ios build --ci
      - name: Package unsigned app artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          app_path="$(find src-tauri/gen/apple -type d -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo 'No .app produced by Tauri iOS build' >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" artifacts/tauritavern-ios-unsigned.app.zip
          find src-tauri/gen/apple -type f -name '*.ipa' -exec cp {} artifacts/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: tauritavern-ios-unsigned
          path: artifacts/
          if-no-files-found: error
