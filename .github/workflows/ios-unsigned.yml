name: iOS unsigned artifact

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ios-unsigned.yml'
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: ios-unsigned-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select stable Xcode
        run: |
          if [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.2.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.0.app/Contents/Developer
          else
            echo "No Xcode 16.2 installation found" >&2
            ls -d /Applications/Xcode*.app >&2 || true
            exit 1
          fi
          xcodebuild -version
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-ios
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend bundles
        run: pnpm run web:build
      - name: Frontend checks
        run: pnpm run check
      - name: Initialize iOS project
        run: pnpm exec tauri ios init
      - name: Build Rust static library
        run: |
          set -euo pipefail
          cargo build --locked --release --target aarch64-apple-ios --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/gen/apple/Externals/arm64/release
          cp src-tauri/target/aarch64-apple-ios/release/libtauritavern_lib.a \
            src-tauri/gen/apple/Externals/arm64/release/libapp.a
          test -s src-tauri/gen/apple/Externals/arm64/release/libapp.a
      - name: Use prebuilt Rust library in Xcode
        run: |
          python3 - <<'PY'
          from pathlib import Path

          project = Path("src-tauri/gen/apple/tauritavern.xcodeproj/project.pbxproj")
          lines = project.read_text().splitlines(keepends=True)
          for index, line in enumerate(lines):
              if "tauri-ios-xcode-script.sh" in line:
                  lines[index] = '\t\t\tshellScript = "test -f \\\"${SRCROOT}/Externals/arm64/${CONFIGURATION}/libapp.a\\\"";\n'
                  break
          else:
              raise SystemExit("Tauri Rust build phase was not found")
          project.write_text("".join(lines))
          PY
      - name: Disable Xcode signing
        run: |
          python3 - <<PY
          from pathlib import Path
          p = Path("src-tauri/gen/apple/tauritavern.xcodeproj/project.pbxproj")
          s = p.read_text()
          additions = "\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGN_IDENTITY = \"\";\n\t\t\t\tDEVELOPMENT_TEAM = \"\";"
          if "CODE_SIGNING_ALLOWED = NO;" not in s:
              s = s.replace("\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER =", additions + "\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER =")
          p.write_text(s)
          PY
      - name: Build unsigned iOS app
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          DEVELOPMENT_TEAM: 
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace src-tauri/gen/apple/tauritavern.xcodeproj/project.xcworkspace \
            -scheme tauritavern_iOS \
            -sdk iphoneos \
            -configuration release \
            -derivedDataPath "$RUNNER_TEMP/tauritavern-derived-data" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build
      - name: Package unsigned app artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          app_path="$RUNNER_TEMP/tauritavern-derived-data/Build/Products/release-iphoneos/TauriTavern.app"
          if [[ ! -d "$app_path" ]]; then
            echo "No unsigned .app produced at $app_path" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" artifacts/tauritavern-ios-unsigned.app.zip
          test -s artifacts/tauritavern-ios-unsigned.app.zip
      - uses: actions/upload-artifact@v4
        with:
          name: tauritavern-ios-unsigned
          path: artifacts/
          if-no-files-found: error
