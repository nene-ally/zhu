name: Mobile Auto Pre-Release

on:
  workflow_dispatch:

concurrency:
  group: mobile-auto-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Resolve app version from package.json
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.getContent({
              owner,
              repo,
              path: "package.json",
              ref: context.ref,
            });
            let packageJson;
            try {
              packageJson = JSON.parse(Buffer.from(data.content, "base64").toString("utf8"));
            } catch (error) {
              throw new Error(`Invalid package.json content: ${error.message}`);
            }
            if (!packageJson.version) {
              throw new Error("Missing version field in package.json");
            }
            core.setOutput("app_version", String(packageJson.version));

      - name: Compute branch-aware release metadata
        id: metadata
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SOURCE_SHA: ${{ github.sha }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          : "${BRANCH_NAME:?Missing github.ref_name}"
          : "${DEFAULT_BRANCH:?Missing github.event.repository.default_branch}"
          : "${SOURCE_SHA:?Missing github.sha}"
          : "${APP_VERSION:?Missing package.json version}"

          branch_slug=${BRANCH_NAME//\//-}
          if [[ "$BRANCH_NAME" == "$DEFAULT_BRANCH" ]]; then
            tag_name="mobile-auto-v$APP_VERSION"
            release_suffix=''
          else
            tag_name="mobile-auto-v$APP_VERSION-$branch_slug"
            release_suffix=" [$BRANCH_NAME]"
          fi

          {
            echo "tag_name=$tag_name"
            echo "release_name<<EOF"
            echo "TauriTavern 移动端自动构建 v$APP_VERSION$release_suffix / TauriTavern Mobile Auto Build v$APP_VERSION$release_suffix"
            echo "EOF"
            echo "release_body<<EOF"
            echo "## 移动端自动构建（预发布）"
            echo "这是由 GitHub Actions 自动构建的移动端预发布版本，仅用于测试和体验，不代表稳定正式版。"
            echo "覆盖平台：Android / iOS。"
            echo "来源分支：$BRANCH_NAME"
            echo "来源提交：$SOURCE_SHA"
            echo
            echo "## Mobile Auto Build (Pre-release)"
            echo "This is an automatically built mobile client pre-release generated by GitHub Actions."
            echo "It is intended for testing and preview only, and is not a stable production release."
            echo "Platforms: Android / iOS."
            echo "Source branch: $BRANCH_NAME"
            echo "Source commit: $SOURCE_SHA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update mobile pre-release
        id: release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
          RELEASE_BODY: ${{ steps.metadata.outputs.release_body }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            const name = process.env.RELEASE_NAME;
            const body = process.env.RELEASE_BODY;
            if (!tag || !name || !body) {
              throw new Error("Missing mobile pre-release metadata outputs.");
            }

            const { owner, repo } = context.repo;

            try {
              const { data: existingRelease } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              if (existingRelease.draft) {
                throw new Error(`Release ${tag} already exists as a draft.`);
              }

              const { data: updatedRelease } = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existingRelease.id,
                tag_name: tag,
                name,
                body,
                draft: false,
                prerelease: true,
              });

              core.setOutput("release_id", String(updatedRelease.id));
              core.info(`Updated existing mobile pre-release ${tag} (${updatedRelease.id}).`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const { data: createdRelease } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name,
                body,
                draft: false,
                prerelease: true,
              });

              core.setOutput("release_id", String(createdRelease.id));
              core.info(`Created mobile pre-release ${tag} (${createdRelease.id}).`);
            }

  build-and-publish:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: android
            platform: ubuntu-latest
            mobile: android
            args: --verbose --apk
          - name: ios
            platform: macos-latest
            mobile: ios
            args: --verbose --debug

    runs-on: ${{ matrix.platform }}
    name: build-${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Android host build dependencies
        if: matrix.mobile == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install Rust toolchain (Android targets)
        if: matrix.mobile == 'android'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Rust toolchain (iOS target)
        if: matrix.mobile == 'ios'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Set up JDK
        if: matrix.mobile == 'android'
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Android SDK
        if: matrix.mobile == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        if: matrix.mobile == 'android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          link-to-sdk: true

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run web:build

      - name: Setup Android signing
        if: matrix.mobile == 'android'
        shell: bash
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Setup App Store Connect API key
        if: matrix.mobile == 'ios'
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER secret}"
          : "${APPLE_API_KEY:?Missing APPLE_API_KEY secret}"
          : "${APPLE_API_KEY_P8:?Missing APPLE_API_KEY_P8 secret}"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build and upload mobile pre-release
        uses: tauri-apps/tauri-action@97cef2bd32ead607bcc2c6af5b40ce2f25d48e77
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ matrix.mobile == 'android' && steps.setup-ndk.outputs.ndk-path || '' }}
          APPLE_API_ISSUER: ${{ matrix.mobile == 'ios' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.mobile == 'ios' && secrets.APPLE_API_KEY || '' }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          prerelease: true
          mobile: ${{ matrix.mobile }}
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          uploadPlainBinary: true
          uploadUpdaterSignatures: false
