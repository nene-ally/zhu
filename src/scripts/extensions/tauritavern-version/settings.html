<div id="tauritavern_version_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b data-i18n="ttv_version.panel_title">TauriTavern Version</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="ttv-info-table">
                <div class="ttv-row">
                    <span class="ttv-label" data-i18n="ttv_version.app_version_label">App Version</span>
                    <strong id="tauritavern_version_number">Loading...</strong>
                </div>
                <div id="ttv-compat-row" class="ttv-row">
                    <span class="ttv-label" data-i18n="ttv_version.compat_label">Compatibility Baseline</span>
                    <strong id="tauritavern_compat_version">Loading...</strong>
                </div>
                <div id="ttv-git-row" class="ttv-row">
                    <span class="ttv-label" data-i18n="ttv_version.git_label">Git Info</span>
                    <strong id="tauritavern_git_info">Loading...</strong>
                </div>
                <div class="ttv-row">
                    <span class="ttv-label" data-i18n="ttv_version.author_label">Author</span>
                    <strong>{{authorName}}</strong>
                </div>
            </div>

            <div class="ttv-actions">
                <a class="menu_button menu_button_icon" href="{{repositoryUrl}}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-github"></i>
                    <span data-i18n="ttv_version.github_repository">GitHub Repository</span>
                </a>
                <a id="ttv-discord-link" class="menu_button menu_button_icon" href="{{discordUrl}}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-discord"></i>
                    <span data-i18n="ttv_version.discord_updates">Discord Update Channel</span>
                </a>
                <button id="tauritavern_export_debug_bundle" class="menu_button menu_button_icon" type="button">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span data-i18n="ttv_version.export_debug_bundle">Export Debug Bundle</span>
                </button>
                <button id="tauritavern_check_update" class="menu_button menu_button_icon" type="button">
                    <i class="fa-solid fa-arrows-rotate"></i>
                    <span data-i18n="ttv_version.check_updates">Check for Updates</span>
                </button>
            </div>

            <div id="tauritavern_update_result" class="ttv-update-result">
                <div class="ttv-update-header">
                    <div class="ttv-update-title">
                        <span class="ttv-update-label" data-i18n="ttv_version.update_available">Update Available</span>
                        <strong id="tauritavern_update_version">Loading...</strong>
                    </div>
                    <button
                        id="tauritavern_update_dismiss"
                        class="menu_button menu_button_icon margin0"
                        type="button"
                        title="Dismiss"
                        data-i18n="[title]ttv_version.dismiss"
                    >
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div id="tauritavern_update_changelog" class="ttv-update-changelog"></div>

                <a id="tauritavern_update_download" class="menu_button menu_button_icon" href="{{repositoryUrl}}" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-download"></i>
                    <span data-i18n="ttv_version.go_to_download">Go to Download</span>
                </a>
            </div>
        </div>
    </div>
</div>
